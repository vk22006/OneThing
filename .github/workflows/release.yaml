name: Release Tauri App

# This workflow triggers only when you push a new Git tag starting with 'v' (e.g., v1.0.0)
on:
  push:
    tags:
      - 'v*'

# CRITICAL: This gives the action permission to create a Release and upload files
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.platform.os }}
    
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
          # Linux x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # Windows x64 (64-bit)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows x86 (32-bit)
          - os: windows-latest
            target: i686-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable (2026-03-27)
        with:
          targets: ${{ matrix.platform.target }}

      # Linux requires specific system dependencies to compile webkit2gtk
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app and create GitHub Release
        uses: tauri-apps/tauri-action@42e9df6c59070d114bf90dcd3943a1b8f138b113 # v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'OneThing ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.platform.target }}